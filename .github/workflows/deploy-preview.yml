name: Deployment Preview Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'deploy/**'
      - '.github/workflows/**'

jobs:
  deploy-preview-validation:
    name: Validate Production Preview Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy structure
        run: |
          test -f deploy/docker-compose.production.yml
          test -f deploy/README.md
          test -f deploy/env/.env.production.example

      - name: Docker compose validation
        run: docker compose -f deploy/docker-compose.production.yml config
