name: ASU Performance Gate

on:
  push:
  pull_request:

jobs:
  performance-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - run: composer install --no-interaction
      - run: php scripts/runtime-performance-baseline.php
      - run: php scripts/performance-gate.php 0
