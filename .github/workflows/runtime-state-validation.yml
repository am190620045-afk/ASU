name: ASU Runtime State Validation

on:
  push:
  pull_request:

jobs:
  state-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - run: composer install --no-interaction
      - run: php scripts/runtime-state-validation.php
