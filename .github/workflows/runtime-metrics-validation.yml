name: ASU Runtime Metrics Validation

on:
  push:
  pull_request:

jobs:
  metrics-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - run: composer install --no-interaction
      - run: php scripts/runtime-metrics-check.php
