services:
  asu-runtime:
    image: asu-runtime:latest
    restart: unless-stopped
    env_file:
      - ./env/.env.production
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3

# Reverse proxy and TLS should be configured separately.
# Do not expose application containers directly to the public internet.
