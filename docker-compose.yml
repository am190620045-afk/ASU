services:
  asu-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asu-runtime
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 5s
      retries: 3
